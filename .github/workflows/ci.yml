name: CI Tests

on:
  push:
    branches:
      - 'integration/**'  # Run CI only on branches starting with "integration/"

  pull_request:
    branches:
      - 'integration/**'  # Run CI for PRs targeting "integration/" branches

jobs:
  test:
    runs-on: ubuntu-latest
    
    
    env:
      FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      USER_NAME: ${{ secrets.USER_NAME }}
      PW: ${{ secrets.PW }} 
      run: |
          echo "FIREBASE_CREDENTIALS=$(echo $FIREBASE_CREDENTIALS | base64 -d)" >> $GITHUB_ENV

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # Adjust if needed

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          chmod +x run  # Ensure script is executable
          ./run install  # Install dependencies

      - name: Set up Firebase credentials
        run: |
          # Create a credential file from the base64 secret
          echo '${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}' | base64 -d > firebase-credentials.json
          # Set an environment variable pointing to this file
          echo "FIREBASE_CREDENTIALS_FILE=$(pwd)/firebase-credentials.json" >> $GITHUB_ENV
        
      - name: Run Tests
        run: |
          source venv/bin/activate
          ./run test