name: CI Tests
on:
  push:
    branches:
      - 'integration/**'  # Run CI only on branches starting with "integration/"

  pull_request:
    branches:
      - 'integration/**'  

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      FIREBASE_CREDENTIALS_B64: ${{ secrets.FIREBASE_CREDENTIALS_B64 }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      USER_NAME: ${{ secrets.USER_NAME }}
      PW: ${{ secrets.PW }} 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # Adjust if needed

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          chmod +x run  # Ensure script is executable
          ./run install  # Install dependencies

      - name: Decode and write Firebase credentials
        run: |
          echo "$FIREBASE_CREDENTIALS_B64" | base64 --decode > src/utils/firebase_creds.json
        
      - name: Run Tests
        run: |
          source venv/bin/activate
          ./run test

  android-build:
      runs-on: ubuntu-latest
      needs: test  # Ensures tests pass before building
      
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
        
        - name: Setup Node
          uses: actions/setup-node@v4.0.2
          with:
            node-version: 18.x
            cache: 'npm'

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: Setup Expo
          uses: expo/expo-github-action@v8
          with:
            expo-version: latest
            eas-version: latest
            token: ${{ secrets.EXPO_TOKEN }}

        - name: Install Dependencies
          run: npm ci

        - name: Build Android App
          run: eas build --platform android --profile development --local --output ${{ github.workspace }}/app-release.apk

        - name: Upload APK Artifact
          uses: actions/upload-artifact@v4
          with:
            name: app-release
            path: ${{ github.workspace }}/app-release.apk