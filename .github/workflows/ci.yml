name: CI Tests
on:
  push:
    branches:
      - 'integration/**'  # Run CI only on branches starting with "integration/"

  pull_request:
    branches:
      - 'integration/**'  

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      FIREBASE_CREDENTIALS_B64: ${{ secrets.FIREBASE_CREDENTIALS_B64 }}
      COLLEGE_API_KEY: ${{ secrets.COLLEGE_API_KEY}}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      USER_NAME: ${{ secrets.USER_NAME }}
      PW: ${{ secrets.PW }} 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'  # Adjust if needed

      - name: Install Dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          chmod +x run  # Ensure script is executable
          ./run install  # Install dependencies

      - name: Decode and write Firebase credentials
        run: |
          echo "$FIREBASE_CREDENTIALS_B64" | base64 --decode > src/utils/firebase_creds.json
        
      - name: Run Tests
        run: |
          source venv/bin/activate
          ./run test
