name: Android Build
on:
  push:
    branches:
      - 'release/**'
  pull_request:
    branches:
      - 'release/**'
jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 18.x
          cache: 'npm'
          cache-dependency-path: frontend/boilermatch/package-lock.json
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install Dependencies
        run: |
          cd frontend/boilermatch
          npm ci
      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android App Locally
        run: |
          cd frontend/boilermatch
          eas build --platform android --profile development --local --output app-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/boilermatch/app-release.apk

